<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Runner</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #0f172a; /* Slate Background */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            width: 100vw !important;
            height: auto !important;
            max-height: 100vh !important;
            object-fit: contain;
            box-shadow: 0 0 20px #008080; /* Teal Glow */
        }
    </style>
</head>
<body>

<script>
// आपका Adsterra Direct Link
const AD_LINK = "https://www.effectivecpmnetwork.com/ked54dtp?key=c6c7a9147cbc1f9a73a66f3b0482881e";

const config = {
    type: Phaser.AUTO,
    backgroundColor: '#0f172a',
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 1200 },
            debug: false
        }
    },
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: 480,
        height: 800
    },
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

const game = new Phaser.Game(config);
let player;
let platforms;
let cursors;
let score = 0;
let scoreText;
let obstacleTimer;
let obstacles;
let isGameOver = false;

function preload() {}

function create() {
    isGameOver = false;

    // Title Text with Teal Glow
    let titleText = this.add.text(240, 70, 'NEON RUNNER', { 
        fontSize: '36px', 
        fill: '#008080', 
        fontWeight: 'bold', 
        fontFamily: 'Arial' 
    }).setOrigin(0.5);
    titleText.setShadow(0, 0, '#008080', 15, true, true);

    // Score Text
    scoreText = this.add.text(20, 20, 'Score: 0', { 
        fontSize: '22px', 
        fill: '#ffffff', 
        fontWeight: 'bold',
        fontFamily: 'Arial' 
    });

    // Platforms (Bottom Base)
    platforms = this.physics.add.staticGroup();
    let groundGraphics = this.add.graphics();
    groundGraphics.fillStyle(0x008080, 1);
    groundGraphics.fillRect(0, 0, 480, 50);
    groundGraphics.generateTexture('ground', 480, 50);
    platforms.create(240, 775, 'ground').refreshBody();

    // Player (Glowing Cube)
    let playerGraphics = this.add.graphics();
    playerGraphics.fillStyle(0x00ffff, 1);
    playerGraphics.fillRect(0, 0, 36, 36);
    playerGraphics.generateTexture('player', 36, 36);

    player = this.physics.add.sprite(80, 680, 'player');
    player.setCollideWorldBounds(true);
    this.physics.add.collider(player, platforms);

    // Obstacles
    obstacles = this.physics.add.group();
    this.physics.add.collider(obstacles, platforms);
    this.physics.add.overlap(player, obstacles, gameOver, null, this);

    // Controls
    cursors = this.input.keyboard.createCursorKeys();
    
    // Touch to Jump
    this.input.on('pointerdown', function () {
        if (!isGameOver && player.body.touching.down) {
            player.setVelocityY(-520);
        }
    }, this);

    obstacleTimer = this.time.addEvent({
        delay: 1400,
        callback: spawnObstacle,
        callbackScope: this,
        loop: true
    });
}

function update() {
    if (isGameOver) return;

    if ((cursors.up.isDown || cursors.space.isDown) && player.body.touching.down) {
        player.setVelocityY(-520);
    }

    score += 1;
    scoreText.setText('Score: ' + Math.floor(score / 10));
}

function spawnObstacle() {
    if (isGameOver) return;

    let obstacleGraphics = this.add.graphics();
    obstacleGraphics.fillStyle(0xff0055, 1);
    obstacleGraphics.fillRect(0, 0, 28, 50);
    obstacleGraphics.generateTexture('obstacle', 28, 50);

    let obstacle = obstacles.create(520, 720, 'obstacle');
    obstacle.setVelocityX(-300 - (score * 0.05)); 
    obstacle.setCollideWorldBounds(false);
    obstacle.checkWorldBounds = true;
    obstacle.outOfBoundsKill = true;
}

function gameOver() {
    isGameOver = true;
    this.physics.pause();
    obstacleTimer.destroy();
    player.setTint(0xff0000);
    
    // Game Over Text
    let overText = this.add.text(240, 320, 'GAME OVER', { 
        fontSize: '40px', 
        fill: '#ff0055', 
        fontWeight: 'bold',
        fontFamily: 'Arial' 
    }).setOrigin(0.5);
    overText.setShadow(0, 0, '#ff0055', 12, true, true);

    // PLAY AGAIN Button (With Adsterra Link)
    let btnBg = this.add.graphics();
    btnBg.fillStyle(0x008080, 1);
    btnBg.fillRoundedRect(90, 420, 300, 65, 12);

    let btnText = this.add.text(240, 452, 'PLAY AGAIN 🚀', {
        fontSize: '24px',
        fill: '#ffffff',
        fontWeight: 'bold',
        fontFamily: 'Arial'
    }).setOrigin(0.5);

    let restartBtn = this.add.zone(240, 452, 300, 65).setInteractive();

    restartBtn.on('pointerdown', () => {
        // Open Adsterra Direct Link in New Tab
        window.open(AD_LINK, '_blank');
        
        // Restart Game
        this.scene.restart();
    });
}
</script>

</body>
</html>
